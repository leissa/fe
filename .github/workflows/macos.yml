name: macos

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: ${{matrix.compiler.name}} ${{matrix.build-type}}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { name: appleclang, cc: clang,  cxx: clang++ }
          - { name: gcc-14,     cc: gcc-14, cxx: g++-14 }
        build-type: [Debug, Release]

    steps:
      - name: Clone recursively
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install GCC
        if: matrix.compiler.name == 'gcc-14'
        run: brew install gcc@14

      - name: Configure
        run: CC=${{matrix.compiler.cc}} CXX=${{matrix.compiler.cxx}} cmake -S ${{github.workspace}} -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{matrix.build-type}} -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build ${{github.workspace}}/build -v

      - name: Test
        run: ctest --test-dir ${{github.workspace}}/build --output-on-failure
