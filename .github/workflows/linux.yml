name: linux

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: ${{matrix.compiler.name}} ${{matrix.build-type}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          # clang uses libstdc++ for its standard library, so g++-14 is installed in both cases.
          - { name: gcc-14, cc: gcc-14, cxx: g++-14,  apt: g++-14 }
          - { name: clang,  cc: clang,  cxx: clang++, apt: clang g++-14 }
        build-type: [Debug, Release]

    steps:
      - name: Clone recursively
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain and Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind ${{matrix.compiler.apt}}

      - name: Configure
        run: CC=${{matrix.compiler.cc}} CXX=${{matrix.compiler.cxx}} cmake -S ${{github.workspace}} -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{matrix.build-type}} -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build ${{github.workspace}}/build -v

      - name: Test with Valgrind
        run: valgrind --error-exitcode=1 --leak-check=full ${{github.workspace}}/build/bin/fe-test
