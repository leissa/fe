name: doxygen

on:
  push:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOXYGEN_TAG: Release_1_16_1
  DOXYGEN_VERSION: 1.16.1
  DOXYGEN_CACHE_DIR: ${{ github.workspace }}/.cache/doxygen-1.16.1

jobs:
  build:
    name: Build and deploy Doxygen documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Graphviz, gcc-14, g++-14
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends graphviz gcc-14 g++-14

      - name: Restore Doxygen cache
        id: cache-doxygen
        uses: actions/cache@v4
        with:
          path: ${{ env.DOXYGEN_CACHE_DIR }}
          key: ${{ runner.os }}-doxygen-${{ env.DOXYGEN_VERSION }}

      - name: Install Doxygen
        if: steps.cache-doxygen.outputs.cache-hit != 'true'
        run: |
          archive="doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz"
          url="https://github.com/doxygen/doxygen/releases/download/${DOXYGEN_TAG}/${archive}"

          mkdir -p "${{ github.workspace }}/.cache"
          rm -rf "${DOXYGEN_CACHE_DIR}"
          curl -L --fail --retry 5 --retry-all-errors --output "${RUNNER_TEMP}/${archive}" "${url}"
          tar -C "${{ github.workspace }}/.cache" -xf "${RUNNER_TEMP}/${archive}"

      - name: Configure
        run: CC=gcc-14 CXX=g++-14 cmake -S ${{github.workspace}} -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=OFF -DFE_BUILD_DOCS=ON -DDOXYGEN_EXECUTABLE=${{ env.DOXYGEN_CACHE_DIR }}/bin/doxygen

      - name: Build
        run: cmake --build ${{github.workspace}}/build -v --target docs

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{github.workspace}}/build/html
